{% extends 'jornal/base.html' %}

{% block content %}
    <article>
        <h2>{{ artigo.titulo }}</h2>
        <p><small>Publicado em: {{ artigo.data_publicacao|date:"d/m/Y H:i" }}</small></p>
        <div style="margin: 20px 0;">
            {{ artigo.corpo|linebreaks }}
        </div>
        <a href="{% url 'comentarios_artigo' artigo.id %}" class="btn">Ver e Publicar Comentários</a>
        <br><br>
        <a href="{% url 'lista_artigos' %}">← Voltar para a lista de artigos</a>
    </article>
{% endblock %}
