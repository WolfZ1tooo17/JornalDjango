<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornal Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: bold; font-size: 1.8rem; letter-spacing: -1px; }
        .card { transition: transform 0.2s, box-shadow 0.2s; border: none; border-radius: 12px; overflow: hidden; }
        .card:hover { transform: translateY(-5px ); box-shadow: 0 10px 20px rgba(0,0,0,0.12); }
        .footer { background: #212529; color: #adb5bd; padding: 30px 0; margin-top: 50px; }
        .btn-primary { border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand text-white" href="{% url 'lista_artigos' %}">
                <span class="text-primary">Jornal</span>Online
            </a>
        </div>
    </nav>
    <div class="container min-vh-100">
        {% block content %}{% endblock %}
    </div>
    <footer class="footer text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 Jornal Online - Todos os direitos reservados</p>
            <small>Desenvolvido com Django e Bootstrap 5</small>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
