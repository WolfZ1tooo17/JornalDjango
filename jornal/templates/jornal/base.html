<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornal Online</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .container { max-width: 800px; margin: auto; }
        .artigo-link { font-size: 1.2em; text-decoration: none; color: #0066cc; }
        .artigo-link:hover { text-decoration: underline; }
        .comentario { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .btn { display: inline-block; background: #333; color: #fff; padding: 10px 15px; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; }
        .btn:hover { background: #555; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{% url 'lista_artigos' %}" style="text-decoration: none; color: inherit;">Jornal Online</a></h1>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
